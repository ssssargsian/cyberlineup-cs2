services:
  db:
    image: postgres:16-alpine
    container_name: cyberlineup-postgres
    restart: unless-stopped
    security_opt:
      - label:disable
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /var/lib/cyberlineup/postgres-data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: node:22-bookworm-slim
    container_name: cyberlineup-app
    restart: unless-stopped
    security_opt:
      - label:disable
    working_dir: /app
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./:/app:Z
      - cyberlineup_node_modules:/app/node_modules
      - cyberlineup_pnpm_store:/root/.local/share/pnpm/store
    depends_on:
      - db
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    command: >
      sh -lc "corepack enable &&
              pnpm start -- -p 3000"

volumes:
  cyberlineup_node_modules:
  cyberlineup_pnpm_store: