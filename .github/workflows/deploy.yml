name: Deploy CyberLineup

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run Prisma migrations"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      run_sync:
        description: "Sync raskidki source"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      run_publish:
        description: "Publish imported lineups after sync"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: cyberlineup-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Ubuntu server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CYBERLINEUP_HOST }}
          username: ${{ secrets.CYBERLINEUP_USER }}
          key: ${{ secrets.CYBERLINEUP_SSH_KEY }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            echo "=== Connected ==="
            whoami
            hostname

            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              RUN_MIGRATIONS="${{ inputs.run_migrations }}"
              RUN_SYNC="${{ inputs.run_sync }}"
              RUN_PUBLISH="${{ inputs.run_publish }}"
            else
              RUN_MIGRATIONS="true"
              RUN_SYNC="false"
              RUN_PUBLISH="false"
            fi

            echo "RUN_MIGRATIONS=$RUN_MIGRATIONS"
            echo "RUN_SYNC=$RUN_SYNC"
            echo "RUN_PUBLISH=$RUN_PUBLISH"

            sudo env \
              RUN_MIGRATIONS="$RUN_MIGRATIONS" \
              RUN_SYNC="$RUN_SYNC" \
              RUN_PUBLISH="$RUN_PUBLISH" \
              bash -x /opt/cyberlineup/deploy.sh